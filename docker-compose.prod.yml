# Run with: docker compose -f docker-compose.prod.yml up -d

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ghcr.io/scovy/server-manager-backend:latest
    container_name: homelab_backend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - backend_data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health', timeout=5).status == 200 else 1)\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ghcr.io/scovy/server-manager-frontend:latest
    container_name: homelab_frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"

  caddy:
    image: caddy:2-alpine
    container_name: homelab_caddy
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-http://localhost}
      ACME_EMAIL: ${ACME_EMAIL:-admin@example.com}
      ACME_CA: ${ACME_CA:-https://acme-v02.api.letsencrypt.org/directory}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: always
    environment:
      - DOCKER_API_VERSION=1.41
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 60 homelab_backend homelab_frontend

volumes:
  backend_data:
  caddy_data:
  caddy_config:
