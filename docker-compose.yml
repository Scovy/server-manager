# Homelab Dashboard — Production Stack
# Run with: docker compose up -d

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: homelab_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      SETUP_CONFIG_ROOT: /workspace
      CADDY_CONTAINER_NAME: homelab_caddy
    volumes:
      - ./:/workspace
      # Mount SQLite database file inside a persistent volume
      - backend_data:/app/data
      # Mount Docker socket via proxy (assuming docker-socket-proxy is running)
      # Or directly for simplicity in testing:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health', timeout=5).status == 200 else 1)\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: homelab_frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"

  caddy:
    image: caddy:2-alpine
    container_name: homelab_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./caddy:/etc/caddy
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend

volumes:
  backend_data:
  caddy_data:
  caddy_config:
